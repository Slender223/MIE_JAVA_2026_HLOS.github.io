            <form>
                <!-- Name field -->

                    <label for="name" style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #4a5568;">Name</label>

                </div>
                
                <!-- Email field -->
                <div style="margin-bottom: 20px;">
                    <label for="email" style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #4a5568;">Email</label>
                    <input type="email" id="email" name="email" style="width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box;">
                </div>
                
                <!-- Message field -->
                <div style="margin-bottom: 25px;">
                    <label for="message" style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #4a5568;">Message</label>
                    <textarea id="message" name="message" rows="4" style="width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; box-sizing: border-box;"></textarea>
                </div>
